    <circle cx="152" cy="42" r="34"/>
    <rect x="44" y="44" width="40" height="112"/>
    <g transform="rotate(-8 120 132)">
      <rect x="84" y="112" width="72" height="44"/>
    </g>
  </g>
</svg>
