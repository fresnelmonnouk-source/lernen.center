<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 2340" width="1080" height="2340">
  <!-- SPLASH CLAIR 1080x2340. Fond cream + grille discrete (signature GridBackground).
       Cercle rose pale debordant coin haut-gauche. Mark SANS tuile (formes directes sur
       cream), disque rouge en petale arrondi flottant detache en haut-droite du L.
       Wordmark LERNEN.de, tagline mono letter-spaced, carre jaune pale incline debordant
       le bord droit, barre de progression ~55% en ink. Polices = font-family avec fallback
       (Kody gere la fidelite finale au rendu). -->
  <defs>
    <!-- Grille signature : pas 40px, lignes ink a ~7% d'opacite -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 H0 V40" fill="none" stroke="#0A0A0A" stroke-width="1" opacity="0.07"/>
    </pattern>
  </defs>

  <!-- Fond cream plein -->
  <rect width="1080" height="2340" fill="#F4F0E6"/>
  <!-- Grille discrete par-dessus -->
  <rect width="1080" height="2340" fill="url(#grid)"/>

  <!-- Cercle rose pale (rouge desature) debordant du coin haut-GAUCHE -->
  <circle cx="60" cy="-40" r="420" fill="#F3D4D4"/>

  <!-- Carre jaune PALE incline debordant le bord droit (milieu-bas) -->
  <g transform="rotate(14 1080 1640)">
    <rect x="900" y="1480" width="320" height="320" fill="#FBE8A6"/>
  </g>

  <!-- ===== MARK (sans tuile, formes directes), centre, vers le tiers haut ===== -->
  <!-- master util x44..157 / y44..158 ; scale 3.6 ; centre horizontal sur 540, top ~560 -->
  <g transform="translate(178 540) scale(3.6)">
    <!-- Disque rouge en petale/feuille arrondie flottant detache, haut-droite du L -->
    <circle cx="152" cy="42" r="34" fill="#E63946"/>
    <rect x="44" y="44" width="40" height="112" fill="#1E40AF"/>
    <g transform="rotate(-8 120 132)">
      <rect x="84" y="112" width="72" height="44" fill="#FFD60A"/>
    </g>
  </g>

  <!-- ===== WORDMARK : LERNEN en ink, .de en rouge serif italic ===== -->
  <text x="540" y="1300" text-anchor="middle"
        font-family="'Bricolage Grotesque', 'Arial Black', sans-serif"
        font-weight="800" font-size="132" fill="#0A0A0A" letter-spacing="-2">LERNEN<tspan
        font-family="'DM Serif Display', Georgia, serif" font-weight="400"
        font-style="italic" fill="#E63946" font-size="132" letter-spacing="0">.de</tspan></text>

  <!-- ===== TAGLINE : mono, MAJUSCULES, gris assourdi, tres letter-spaced ===== -->
  <text x="540" y="1410" text-anchor="middle"
        font-family="'JetBrains Mono', 'Courier New', monospace"
        font-weight="400" font-size="40" fill="#7A746A"
        letter-spacing="14">APPRENDS L'ALLEMAND</text>

  <!-- ===== BARRE DE PROGRESSION (bas) : ~55% rempli en ink, reste gris clair ===== -->
  <rect x="240" y="2120" width="600" height="16" fill="#DDD3B8"/>
  <rect x="240" y="2120" width="330" height="16" fill="#0A0A0A"/>
</svg>
